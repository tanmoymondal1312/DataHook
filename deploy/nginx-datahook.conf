# nginx server block for datahook.mediaghor.com
#
# Install:
#   sudo cp deploy/nginx-datahook.conf /etc/nginx/sites-available/datahook
#   sudo ln -s /etc/nginx/sites-available/datahook /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: run `sudo certbot --nginx -d datahook.mediaghor.com` to obtain a cert;
# certbot will rewrite this block to add the 443 server + redirect.

upstream datahook_app {
    server 127.0.0.1:9100;
}

server {
    listen 80;
    listen [::]:80;
    server_name datahook.mediaghor.com;

    # Allow reasonably large form/multipart submissions to /ingest/.
    client_max_body_size 10M;

    access_log /var/log/nginx/datahook.access.log;
    error_log  /var/log/nginx/datahook.error.log;

    # Collected static files (run `manage.py collectstatic`).
    location /static/ {
        alias /srv/datahook/staticfiles/;
        access_log off;
        expires 7d;
    }

    # User uploads (endpoint notification logos). Must be publicly readable:
    # FCM fetches these URLs server-side to render the notification's icon.
    location /media/ {
        alias /home/tanmoy/apps/datahook/media/;
        access_log off;
        # no-store, not a short TTL: Cloudflare overrides origin max-age with
        # its own Browser Cache TTL (4h), which would leave a deleted logo
        # retrievable from the edge long after it is gone from disk. no-store
        # is honoured, so deleting an account really does remove the image
        # everywhere. Logos are tiny and rarely fetched.
        add_header Cache-Control "no-store" always;
    }

    location / {
        proxy_pass http://datahook_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }
}
